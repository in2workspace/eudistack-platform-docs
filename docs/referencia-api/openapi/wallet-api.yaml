openapi: 3.1.0
info:
  title: Wallet Backend API
  description: |
    API para la gestión de credenciales verificables en el wallet del usuario.

    ## Características principales
    - Gestión segura de credenciales digitales
    - Creación de pares de claves (secp256r1)
    - Gestión de DIDs (did:key)
    - Flujos EBSI compliance
    - Soporte cross-device y same-device
    - Comunicación WebSocket en tiempo real
  version: 2.0.1
  contact:
    name: EUDIStack Team
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: https://wallet.eudistack.example.com
    description: Servidor de producción
  - url: https://sandbox.wallet.eudistack.example.com
    description: Servidor de sandbox
  - url: http://localhost:8080
    description: Servidor de desarrollo local

tags:
  - name: Credentials
    description: Gestión de credenciales verificables
  - name: Presentations
    description: Gestión de presentaciones verificables
  - name: QR Processing
    description: Procesamiento de códigos QR
  - name: EBSI
    description: Endpoints específicos de EBSI
  - name: OpenID4VCI
    description: Endpoints de ofertas de credenciales OpenID

paths:
  # ============================================
  # CREDENTIALS ENDPOINTS
  # ============================================
  /api/v1/credentials:
    get:
      tags:
        - Credentials
      summary: Listar credenciales verificables
      description: |
        Recupera la lista de todas las credenciales verificables almacenadas en el wallet del usuario.
        Las credenciales incluyen su estado de ciclo de vida y datos codificados.
      operationId: listCredentials
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de credenciales obtenida correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VerifiableCredential'
        '400':
          description: Solicitud inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'

  /api/v1/credentials/{credentialId}:
    delete:
      tags:
        - Credentials
      summary: Eliminar credencial verificable
      description: |
        Elimina una credencial verificable del wallet del usuario.
        Esta operación elimina la credencial del almacenamiento (context broker).
      operationId: deleteCredential
      security:
        - bearerAuth: []
      parameters:
        - name: credentialId
          in: path
          required: true
          description: ID único de la credencial a eliminar
          schema:
            type: string
      responses:
        '204':
          description: Credencial eliminada correctamente
        '400':
          description: Solicitud inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '404':
          description: Credencial no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'

  # ============================================
  # QR PROCESSING ENDPOINTS
  # ============================================
  /api/v1/execute-content:
    post:
      tags:
        - QR Processing
      summary: Procesar contenido de código QR
      description: |
        Procesa el contenido escaneado de un código QR.
        El contenido puede ser una oferta de credencial (credential offer) o una solicitud de presentación.
        El sistema detecta automáticamente el tipo de contenido y ejecuta el flujo correspondiente.
      operationId: executeQrContent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QrContent'
      responses:
        '201':
          description: Contenido procesado correctamente
          content:
            application/json:
              schema:
                type: object
                description: Resultado del procesamiento (varía según el tipo de contenido)
        '400':
          description: Contenido QR inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '404':
          description: Contenido QR no reconocido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'

  # ============================================
  # SIGNED CREDENTIAL ENDPOINTS
  # ============================================
  /api/v1/request-signed-credential:
    get:
      tags:
        - Credentials
      summary: Solicitar credencial firmada
      description: |
        Solicita una credencial firmada para una credencial específica.
        Este endpoint se utiliza para obtener una versión firmada de una credencial existente.
      operationId: requestSignedCredential
      security:
        - bearerAuth: []
      parameters:
        - name: credentialId
          in: query
          required: true
          description: ID de la credencial a firmar
          schema:
            type: string
      responses:
        '200':
          description: Solicitud procesada correctamente
        '400':
          description: Solicitud inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '404':
          description: Credencial no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'

  # ============================================
  # VERIFIABLE PRESENTATION ENDPOINTS
  # ============================================
  /api/v1/vp:
    post:
      tags:
        - Presentations
      summary: Crear presentación verificable
      description: |
        Crea y envía una presentación verificable con las credenciales seleccionadas.
        Se utiliza para responder a una solicitud de verificación (OpenID4VP).
      operationId: createVerifiablePresentation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VcSelectorResponse'
      responses:
        '201':
          description: Presentación creada y enviada correctamente
        '400':
          description: Solicitud inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'

  /api/v1/vp/cbor:
    post:
      tags:
        - Presentations
      summary: Crear presentación verificable en formato CBOR
      description: |
        Crea una presentación verificable en formato CBOR (mDL/ISO 18013-5).
        Este formato es utilizado para credenciales móviles como el carnet de conducir digital.
      operationId: createVerifiablePresentationCbor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifiableCredential'
      responses:
        '201':
          description: Presentación CBOR creada correctamente
          content:
            application/json:
              schema:
                type: string
                description: Presentación en formato CBOR codificado
        '400':
          description: Solicitud inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'

  # ============================================
  # EBSI ENDPOINTS
  # ============================================
  /api/v1/ebsi-did:
    get:
      tags:
        - EBSI
      summary: Obtener DID EBSI
      description: |
        Obtiene el Decentralized Identifier (DID) EBSI del wallet.
        Este DID se utiliza para interactuar con el ecosistema EBSI.
      operationId: getEbsiDid
      responses:
        '200':
          description: DID EBSI obtenido correctamente
          content:
            application/json:
              schema:
                type: string
                description: DID en formato did:ebsi o did:key
                example: "did:key:z2dmzD81cgPx8Vki7JbuuMmFYrWPgYoytykUZ3eyqht1j9KbrVWHXPGCKJrkSbA6kd9BgW1GQF6LJ7VPNaHdj3PmZ7j8fBD4CZiVrBHB4E7hqN7Ydnf4LYmGqLnfE8VK1rLYHsQXHf"

  /api/v1/openid-credential-offer:
    get:
      tags:
        - OpenID4VCI
      summary: Procesar oferta de credencial OpenID
      description: |
        Procesa una oferta de credencial recibida por redirección.
        El sistema detecta automáticamente si es una oferta EBSI o estándar.
      operationId: processCredentialOffer
      security:
        - bearerAuth: []
      parameters:
        - name: credentialOfferUri
          in: query
          required: true
          description: URI de la oferta de credencial
          schema:
            type: string
            format: uri
          example: "openid-credential-offer://?credential_offer_uri=https://issuer.example.com/offers/abc123"
      responses:
        '200':
          description: Oferta procesada correctamente
        '400':
          description: URI de oferta inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalErrorMessage'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token de acceso JWT del usuario autenticado

  schemas:
    # ============================================
    # CREDENTIAL SCHEMAS
    # ============================================
    VerifiableCredential:
      type: object
      description: Credencial verificable almacenada en el wallet
      properties:
        '@context':
          type: array
          items:
            type: string
          description: Contextos JSON-LD de la credencial
          example: ["https://www.w3.org/2018/credentials/v1"]
        id:
          type: string
          description: Identificador único de la credencial
          example: "urn:uuid:3978344f-8596-4c3a-a978-8fcaba3903c5"
        type:
          type: array
          items:
            type: string
          description: Tipos de la credencial
          example: ["VerifiableCredential", "LEARCredentialEmployee"]
        lifeCycleStatus:
          type: string
          description: Estado del ciclo de vida de la credencial
          enum:
            - VALID
            - ISSUED
            - REVOKED
            - EXPIRED
          example: VALID
        name:
          type: string
          description: Nombre descriptivo de la credencial
          example: "LEAR Credential Employee"
        description:
          type: string
          description: Descripción de la credencial
        issuer:
          oneOf:
            - type: string
            - type: object
          description: Emisor de la credencial (DID o objeto)
          example: "did:elsi:VATES-Q2866001G"
        validFrom:
          type: string
          format: date-time
          description: Fecha de inicio de validez
          example: "2026-01-15T00:00:00Z"
        validUntil:
          type: string
          format: date-time
          description: Fecha de expiración
          example: "2027-01-15T00:00:00Z"
        credentialSubject:
          type: object
          description: Datos del sujeto de la credencial
          additionalProperties: true
        credentialStatus:
          $ref: '#/components/schemas/CredentialStatus'
        credentialEncoded:
          type: string
          description: Credencial codificada en formato JWT o SD-JWT

    CredentialStatus:
      type: object
      description: Estado de revocación de la credencial (Bitstring Status List)
      properties:
        id:
          type: string
          description: URI del estado
          example: "https://issuer.example.com/status/1#12345"
        type:
          type: string
          description: Tipo de estado
          example: "BitstringStatusListEntry"
        statusPurpose:
          type: string
          description: Propósito del estado
          enum:
            - revocation
            - suspension
          example: "revocation"
        statusListIndex:
          type: string
          description: Índice en la lista de estado
          example: "12345"
        statusListCredential:
          type: string
          description: URI de la credencial de lista de estado
          example: "https://issuer.example.com/status/1"

    CredentialsBasicInfo:
      type: object
      description: Información básica de una credencial
      properties:
        id:
          type: string
          description: ID de la credencial
        type:
          type: array
          items:
            type: string
          description: Tipos de la credencial
        status:
          type: string
          enum:
            - VALID
            - ISSUED
            - REVOKED
            - EXPIRED
          description: Estado del ciclo de vida
        availableFormats:
          type: array
          items:
            type: string
          description: Formatos disponibles de la credencial
          example: ["jwt_vc_json", "sd-jwt_vc"]
        credentialSubject:
          type: object
          description: Datos del sujeto
        validUntil:
          type: string
          format: date-time
          description: Fecha de expiración

    # ============================================
    # QR CONTENT SCHEMAS
    # ============================================
    QrContent:
      type: object
      description: Contenido escaneado de un código QR
      required:
        - qr_content
      properties:
        qr_content:
          type: string
          description: Contenido del código QR (puede ser una URI de oferta de credencial o solicitud de presentación)
          example: "openid-credential-offer://?credential_offer_uri=https://issuer.example.com/offers/abc123"

    # ============================================
    # PRESENTATION SCHEMAS
    # ============================================
    VcSelectorResponse:
      type: object
      description: Respuesta de selección de credenciales para una presentación
      required:
        - redirectUri
        - state
        - selectedVcList
      properties:
        redirectUri:
          type: string
          format: uri
          description: URI de redirección para enviar la presentación
          example: "https://verifier.example.com/callback"
        state:
          type: string
          description: Estado de la sesión de verificación
          example: "session_abc123"
        nonce:
          type: string
          description: Nonce para la presentación
          example: "n-0S6_WzA2Mj"
        selectedVcList:
          type: array
          items:
            $ref: '#/components/schemas/VerifiableCredential'
          description: Lista de credenciales seleccionadas para la presentación

    # ============================================
    # ERROR SCHEMAS
    # ============================================
    GlobalErrorMessage:
      type: object
      description: Mensaje de error global
      properties:
        title:
          type: string
          description: Título del error
          example: "Invalid Request"
        message:
          type: string
          description: Mensaje descriptivo del error
          example: "The credential ID provided is invalid"
        path:
          type: string
          description: Path de la solicitud que generó el error
          example: "/api/v1/credentials/abc123"

    ApiErrorResponse:
      type: object
      description: Respuesta de error de la API (RFC 7807)
      properties:
        type:
          type: string
          description: URI que identifica el tipo de error
          example: "https://api.eudistack.example.com/errors/invalid-credential"
        title:
          type: string
          description: Título corto del error
          example: "Invalid Credential"
        status:
          type: integer
          description: Código de estado HTTP
          example: 400
        detail:
          type: string
          description: Descripción detallada del error
          example: "The credential with ID 'abc123' does not exist or has been revoked"
        instance:
          type: string
          description: URI de la instancia específica del error
          example: "/api/v1/credentials/abc123"
