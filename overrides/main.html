{% extends "base.html" %}

{% block extrahead %}
  <!-- Open Graph meta tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title }} - {{ config.site_name }}">
  <meta property="og:description" content="{{ config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url }}">
  {% if config.site_url %}
  <meta property="og:image" content="{{ config.site_url }}assets/img/social-card.png">
  {% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }} - {{ config.site_name }}">
  <meta name="twitter:description" content="{{ config.site_description }}">
  {% if config.site_url %}
  <meta name="twitter:image" content="{{ config.site_url }}assets/img/social-card.png">
  {% endif %}
{% endblock %}
