# ==============================================================================
# EUDIStack Documentation - MkDocs Configuration
# ==============================================================================

site_name: EUDIStack Docs
site_url: https://docs.eudistack.net/
site_author: Altia Consultores, S.A.
site_description: >-
  Knowledge base oficial de EUDIStack: guías para usuarios finales del Wallet,
  Issuer y Verifier, y documentación técnica para integradores.

# Repository information
repo_name: in2workspace/eudistack-platform-docs
repo_url: https://github.com/in2workspace/eudistack-platform-docs
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2024-2026 Altia Consultores, S.A. — All rights reserved

# ==============================================================================
# Theme Configuration
# ==============================================================================
theme:
  name: material
  custom_dir: overrides
  language: es

  logo: assets/img/logo.svg
  favicon: assets/img/favicon.svg

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# ==============================================================================
# Plugins
# ==============================================================================
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
      lang:
        - es
        - en

  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: es
          default: true
          name: Español
          build: true
          site_name: "EUDIStack Docs"
        - locale: en
          name: English
          build: true
          site_name: "EUDIStack Docs"
          nav_translations:
            Inicio: Home
            Usuarios: Users
            Wallet — EUDIW: Wallet — EUDIW
            Wallet — Business Wallet: Wallet — Business Wallet
            Portal Issuer: Issuer Portal
            Verifier: Verifier
            Solución de problemas: Troubleshooting
            Developers: Developers
            Primeros pasos: Getting Started
            Conceptos: Concepts
            Guías: Guides
            Referencia API: API Reference
            Referencia: Reference
            Glosario: Glossary
            Estándares: Standards
            Changelog: Changelog
            Soporte: Support

  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true

  - minify:
      minify_html: true

# ==============================================================================
# Markdown Extensions
# ==============================================================================
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Enlace permanente
      toc_depth: 3

  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# ==============================================================================
# Extra Configuration
# ==============================================================================
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/in2workspace
      name: GitHub

# ==============================================================================
# Extra CSS and JavaScript
# ==============================================================================
extra_css:
  - assets/stylesheets/extra.css

# ==============================================================================
# Navigation Structure
# ==============================================================================
nav:
  - Inicio: index.md

  - Usuarios:
      - users/index.md
      - Wallet — EUDIW:
          - users/wallet-eudiw/index.md
          - Primeros pasos: users/wallet-eudiw/getting-started.md
          - Recibir credenciales: users/wallet-eudiw/receive-credentials.md
          - Presentar credenciales: users/wallet-eudiw/present-credentials.md
          - Gestionar credenciales: users/wallet-eudiw/manage-credentials.md
      - Wallet — Business Wallet:
          - users/wallet-business/index.md
          - Primeros pasos: users/wallet-business/getting-started.md
          - Dispositivos y claves: users/wallet-business/devices.md
          - Operativa diaria: users/wallet-business/daily-operations.md
      - Portal Issuer:
          - users/issuer-portal/index.md
          - Emitir una credencial: users/issuer-portal/issue-credential.md
          - Gestionar emisiones: users/issuer-portal/manage-issuances.md
      - Verifier:
          - users/verifier/index.md
          - Verificación remota: users/verifier/remote-verification.md
          - Verificación presencial: users/verifier/proximity-verification.md
      - Solución de problemas: users/troubleshooting.md

  - Developers:
      - developers/index.md
      - Primeros pasos:
          - developers/getting-started/index.md
          - Sandbox: developers/getting-started/sandbox.md
          - Tu primera integración: developers/getting-started/first-integration.md
      - Conceptos:
          - developers/concepts/index.md
          - OID4VCI: developers/concepts/oid4vci.md
          - OID4VP: developers/concepts/oid4vp.md
          - SD-JWT VC: developers/concepts/sd-jwt-vc.md
          - DPoP & PKCE: developers/concepts/dpop-pkce.md
          - Multi-tenant: developers/concepts/multi-tenant.md
      - Guías:
          - developers/guides/index.md
          - OIDC IdP (login con credencial): developers/guides/oidc-idp.md
          - SCIM Provisioning: developers/guides/scim-provisioning.md
          - API Direct Issuance: developers/guides/api-direct-issuance.md
      - Referencia API:
          - developers/api-reference/index.md
          - Issuer API: developers/api-reference/issuer.md
          - Verifier API: developers/api-reference/verifier.md
          - Wallet (EBW) API: developers/api-reference/wallet-ebw.md
      - Solución de problemas: developers/troubleshooting.md

  - Referencia:
      - reference/index.md
      - Glosario: reference/glossary.md
      - Estándares: reference/standards.md
      - Changelog: reference/changelog.md

  - Soporte: support.md
